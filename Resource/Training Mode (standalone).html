  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:'Oxanium',sans-serif; display:flex; flex-direction:column; overflow:hidden; user-select:none; position:relative; border:1px solid #1a2230;\">\n\n  <!-- HEADER -->\n  <div style=\"height:50px; flex:0 0 50px; display:flex; align-items:center; padding:0 16px; gap:16px; background:#070a0f; border-bottom:1px solid #1c2433;\">\n    <div style=\"display:flex; align-items:center; gap:9px;\">\n      <div style=\"width:10px; height:10px; background:#2fe08b; box-shadow:0 0 8px #2fe08b; transform:rotate(45deg);\"><\u002Fdiv>\n      <span style=\"font-weight:800; letter-spacing:3px; font-size:15px; color:#eaf2f8;\">TRAINING<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"width:1px; height:22px; background:#1c2433;\"><\u002Fdiv>\n    <div style=\"display:flex; align-items:center; padding:4px 10px; border:1px solid {{ modeBorder }}; background:{{ modeBg }}; border-radius:2.5px;\">\n      <span style=\"font-family:'Oxanium'; font-weight:800; font-size:12px; letter-spacing:2px; color:{{ modeColor }}; line-height:1;\">{{ modeLabel }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:5px; padding:3px 8px; border:1px solid #1d4a38; background:#0a1a14; border-radius:2.5px;\">\n      <span style=\"font-size:8px; letter-spacing:1px; color:#2fe08b; font-weight:700;\">BPM<\u002Fspan>\n      <span style=\"font-family:'Share Tech Mono'; font-size:13px; color:#2fe08b; line-height:1;\">{{ dispBpm }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; line-height:1.15;\">\n      <span style=\"font-size:13px; font-weight:600; color:#dfe8f0; letter-spacing:.5px;\">conflict // SP ANOTHER<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:2.5px;\">\n      <button onclick=\"{{ togglePlay }}\" title=\"{{ stateLabel }}\" style=\"display:flex; align-items:center; justify-content:center; width:34px; height:34px; border:1px solid {{ playBtnBorder }}; background:{{ playBtnBg }}; color:{{ playBtnColor }}; border-radius:2px; cursor:pointer; font-size:13px;\">{{ playIcon }}<\u002Fbutton>\n      <button onclick=\"{{ toggleRepeat }}\" title=\"Repeat loop {{ repeatOnStr }}\" style=\"display:flex; align-items:center; justify-content:center; width:34px; height:34px; border:1px solid {{ repeatBtnBorder }}; background:{{ repeatBtnBg }}; color:{{ repeatBtnColor }}; border-radius:2px; cursor:pointer; font-size:16px;\">↻<\u002Fbutton>\n      <button onclick=\"{{ openOptions }}\" title=\"Config\" style=\"display:flex; align-items:center; justify-content:center; width:34px; height:34px; border:1px solid #2a3340; background:#0d121a; color:#aab6c4; border-radius:2px; cursor:pointer; font-size:16px;\">⚙<\u002Fbutton>\n      <button onclick=\"{{ toggleView }}\" title=\"View / Layout\" style=\"display:flex; align-items:center; justify-content:center; width:34px; height:34px; border:1px solid {{ viewBtnBorder }}; background:{{ viewBtnBg }}; color:{{ viewBtnColor }}; border-radius:2px; cursor:pointer; font-size:15px;\">▦<\u002Fbutton>\n    <\u002Fdiv>\n    <!-- VIEW / LAYOUT popover (in-design, works in standalone export) -->\n    <sc-if value=\"{{ viewOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; top:48px; right:12px; z-index:40; width:240px; background:#0a0e15; border:1px solid #283242; box-shadow:0 12px 40px rgba(0,0,0,.6); padding:13px;\">\n        <div style=\"font-size:11px; letter-spacing:2px; color:#6b7888; font-weight:700; margin-bottom:9px;\">PLAY STYLE<\u002Fdiv>\n        <div style=\"display:flex; gap:6px; margin-bottom:13px;\">\n          <sc-for list=\"{{ modeBtns }}\" as=\"m\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ m.onClick }}\" style=\"flex:1; font-family:'Oxanium'; font-weight:700; font-size:12px; letter-spacing:2px; padding:8px 0; cursor:pointer; border:1px solid {{ m.border }}; background:{{ m.bg }}; color:{{ m.color }}; border-radius:2px;\">{{ m.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:11px; letter-spacing:2px; color:#6b7888; font-weight:700; margin-bottom:9px;\">LAYOUT<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:6px;\">\n          <sc-for list=\"{{ layoutBtns }}\" as=\"l\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ l.onClick }}\" title=\"{{ l.title }}\" style=\"font-family:'Share Tech Mono'; font-size:11px; letter-spacing:.5px; padding:8px 4px; cursor:pointer; border:1px solid {{ l.border }}; background:{{ l.bg }}; color:{{ l.color }}; border-radius:2px;\">{{ l.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:10px; line-height:1.5; color:#46525f; margin-top:11px;\">{{ layoutNote }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- MAIN -->\n  <div style=\"flex:1; display:flex; min-height:0;\">\n\n    <!-- CENTER PLAYFIELD -->\n    <div style=\"flex:1; display:flex; align-items:center; justify-content:{{ stageJustify }}; position:relative; padding:0 16px; background:radial-gradient(ellipse at 50% 30%,#0a1018,#04060a 70%);\">\n      <div style=\"display:flex; align-items:center; gap:14px;\">\n        <!-- EARLY / LATE per-measure timing (Y = song position, like density) -->\n        <div style=\"order:{{ timingOrder }}; position:relative; width:38px; height:672px; background:#0a0e14; border:1px solid #1c2531;\">\n            <span style=\"position:absolute; top:-14px; left:0; right:0; text-align:center; font-family:'Share Tech Mono'; font-size:8px; letter-spacing:1px; color:#46525f;\">TIMING<\u002Fspan>\n              <sc-for list=\"{{ measureRows }}\" as=\"t\" hint-placeholder-count=\"40\">\n                <div style=\"position:absolute; bottom:{{ t.bottom }}; height:{{ t.height }}; left:{{ t.leftPct }}; width:{{ t.widthPct }}; background:{{ t.color }};\"><\u002Fdiv>\n              <\u002Fsc-for>\n              <!-- JUST (0ms) vertical center line -->\n              <div style=\"position:absolute; top:0; bottom:0; left:50%; width:1px; background:#3a4858;\"><\u002Fdiv>\n              <span style=\"position:absolute; top:2px; left:3px; font-family:'Share Tech Mono'; font-size:7px; color:#2f6f8a;\">E<\u002Fspan>\n              <span style=\"position:absolute; top:2px; right:3px; font-family:'Share Tech Mono'; font-size:7px; color:#7a4248;\">L<\u002Fspan>\n        <\u002Fdiv>\n        <!-- vertical play slider — 3px thin -->\n        <div id=\"vtl-track\" style=\"order:{{ sliderOrder }}; {{ sliderNudge }} position:relative; width:24px; height:672px; cursor:pointer; touch-action:none;\">\n          <!-- thin 3px track -->\n          <div style=\"position:absolute; left:50%; transform:translateX(-50%); top:0; bottom:0; width:3px; background:#0c1118; border-radius:2px;\">\n            <!-- played fill -->\n            <div style=\"position:absolute; left:0; right:0; bottom:0; height:{{ playBottom }}; background:linear-gradient(0deg,rgba(110,150,210,.55),rgba(110,150,210,.12)); border-radius:2px;\"><\u002Fdiv>\n            <!-- repeat region -->\n            <div style=\"position:absolute; left:-1px; right:-1px; bottom:{{ repShadeBottom }}; height:{{ repShadeHeight }}; background:rgba(47,224,139,.20); border-top:1px solid rgba(255,122,82,.65); border-bottom:1px solid rgba(47,224,139,.65);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <!-- playhead thumb (small block) -->\n          <div style=\"position:absolute; left:50%; transform:translateX(-50%); bottom:{{ playBottom }}; width:5px; height:10px; margin-bottom:-5px; background:#eef4fa; box-shadow:0 0 8px rgba(238,244,250,.9); border-radius:1px;\"><\u002Fdiv>\n          <!-- A handle (repeat start) chevron — on the LEFT edge, always draggable -->\n          <div data-drag=\"a\" style=\"position:absolute; {{ chevAnchor }} bottom:{{ aBottom }}; display:{{ chevDisplay }}; align-items:center; justify-content:center; margin-bottom:-11px; padding:7px 7px; cursor:ns-resize; opacity:{{ aOpacity }}; touch-action:none;\">\n            <span style=\"font-size:13px; line-height:1; color:#2fe08b; pointer-events:none;\">{{ chevArrow }}<\u002Fspan>\n          <\u002Fdiv>\n          <!-- B handle (repeat end) chevron — mirrors with side -->\n          <div data-drag=\"b\" style=\"position:absolute; {{ chevAnchor }} bottom:{{ bBottom }}; display:{{ chevDisplay }}; align-items:center; justify-content:center; margin-bottom:-11px; padding:7px 7px; cursor:ns-resize; opacity:{{ bOpacity }}; touch-action:none;\">\n            <span style=\"font-size:13px; line-height:1; color:#ff7a52; pointer-events:none;\">{{ chevArrow }}<\u002Fspan>\n          <\u002Fdiv>\n          <!-- drag time tooltip (mirrors with side) -->\n          <div style=\"position:absolute; {{ tipAnchor }} bottom:{{ dragTipBottom }}; transform:translateY(50%); display:{{ dragTipDisplay }}; align-items:center; gap:6px; padding:3px 8px; background:#0a0e14; border:1px solid {{ dragTipColor }}; border-radius:3px; white-space:nowrap; pointer-events:none; z-index:5;\">\n            <span style=\"font-family:'Share Tech Mono'; font-size:8px; letter-spacing:1px; color:{{ dragTipColor }};\">{{ dragTipLabel }}<\u002Fspan>\n            <span style=\"font-family:'Share Tech Mono'; font-size:12px; color:#eaf2f8; line-height:1;\">{{ dragTipText }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- vertical density histogram (scratch + notes) -->\n        <div style=\"order:{{ densityOrder }}; position:relative; width:34px; height:672px; background:#0a0e14; border:1px solid #1c2531;\">\n          <span style=\"position:absolute; top:-14px; left:0; right:0; text-align:center; font-family:'Share Tech Mono'; font-size:8px; letter-spacing:1px; color:#46525f;\">DENSITY<\u002Fspan>\n            <sc-for list=\"{{ densityRows }}\" as=\"d\" hint-placeholder-count=\"24\">\n              <div style=\"position:absolute; left:0; right:0; bottom:{{ d.bottom }}; height:{{ d.height }}; display:flex; align-items:stretch;\">\n                <div style=\"width:{{ d.scratchW }}; background:rgba(255,80,92,.85);\"><\u002Fdiv>\n                <div style=\"width:{{ d.noteW }}; background:rgba(96,165,250,.8);\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"position:absolute; left:-2px; right:-2px; height:1px; background:#eef4fa; box-shadow:0 0 6px rgba(238,244,250,.8); bottom:{{ playBottom }};\"><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- CANVAS UNIT: play canvas + gauge stacked -->\n        <div style=\"order:{{ canvasOrder }}; display:flex; flex-direction:column;\">\n        <!-- canvas cell -->\n        <div style=\"position:relative; width:{{ canvasW }}px;\">\n        <canvas id=\"pf-canvas\" width=\"412\" height=\"694\" style=\"display:block; width:412px; height:694px; background:#02040700; box-shadow:0 0 0 1px #1a2434, 0 0 40px rgba(0,0,0,.6);\"><\u002Fcanvas>\n        <!-- combo -->\n        <sc-if value=\"{{ showCombo }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; left:50%; top:264px; transform:translateX(-50%); text-align:center; pointer-events:none;\">\n            <div style=\"font-family:'Share Tech Mono'; font-size:54px; color:#eef4fa; line-height:1; text-shadow:0 0 16px rgba(120,180,255,.5); animation:tm-combopop .12s ease-out;\">{{ combo }}<\u002Fdiv>\n            <div style=\"font-size:11px; letter-spacing:6px; color:#7d8a99; margin-top:2px;\">COMBO<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <!-- judgment flash -->\n        <sc-if value=\"{{ showJudge }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; left:50%; top:368px; transform:translate(-50%,0); text-align:center; pointer-events:none; opacity:{{ judgeOpacity }};\">\n            <div style=\"font-family:'Oxanium'; font-weight:800; font-size:30px; letter-spacing:2px; color:{{ judgeColor }}; text-shadow:0 0 14px {{ judgeGlow }}; animation:tm-pop .16s ease-out;\">{{ judgeText }}<\u002Fdiv>\n            <div style=\"font-family:'Share Tech Mono'; font-size:13px; letter-spacing:3px; color:{{ judgeSubColor }}; margin-top:1px;\">{{ judgeSub }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <!-- count-in overlay -->\n        <sc-if value=\"{{ showCountIn }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(3,6,10,.55); backdrop-filter:blur(1px);\">\n            <div style=\"font-size:11px; letter-spacing:5px; color:#6b7888; margin-bottom:14px;\">RESUMING IN<\u002Fdiv>\n            <div style=\"position:relative; width:180px; height:180px;\">\n              <svg width=\"180\" height=\"180\" viewBox=\"0 0 180 180\" style=\"position:absolute; inset:0; transform:rotate(-90deg);\">\n                <circle cx=\"90\" cy=\"90\" r=\"70\" fill=\"none\" stroke=\"#16202b\" stroke-width=\"6\"><\u002Fcircle>\n                <circle cx=\"90\" cy=\"90\" r=\"70\" fill=\"none\" stroke=\"#2fe08b\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-dasharray=\"439.823\" stroke-dashoffset=\"{{ countInDash }}\" style=\"filter:drop-shadow(0 0 6px rgba(47,224,139,.6));\"><\u002Fcircle>\n              <\u002Fsvg>\n              <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono'; font-size:84px; color:#2fe08b; line-height:1; text-shadow:0 0 24px rgba(47,224,139,.6);\">{{ countInNum }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'Share Tech Mono'; font-size:11px; letter-spacing:2px; color:#54616f; margin-top:14px;\">LEAD-IN {{ resumeLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <\u002Fdiv>\n        <!-- gauge: folded directly under the red line -->\n        <div style=\"box-sizing:border-box; width:{{ canvasW }}px; display:flex; align ill below judgment line (lane base) so notes never show past the line\n    for(const ln of this.lanes){ ctx.fillStyle = ln.type==='s'?'#1a0a0d':'#0c1018'; ctx.fillRect(ln.x, JY, ln.w, H-JY); }\n\n    // judgment line at the very bottom (meets the green separator below)\n    ctx.fillStyle='rgba(255,60,80,1)'; ctx.fillRect(0,JY,W,H-JY);\n    ctx.fillStyle='rgba(255,60,80,.9)'; ctx.fillRect(0,JY-1,W,1);\n\n    // key flashes\n    for(const lane of e.pressed){ const ln=this.colByLane[lane]; if(!ln) continue; const grad=ctx.createLinearGradient(0,JY,0,JY-120); const col = ln.type==='s'?'rgba(255,70,90,':ln.type==='w'?'rgba(230,240,250,':'rgba(90,180,255,'; grad.addColorStop(0,col+'.45)'); grad.addColorStop(1,col+'0)'); ctx.fillStyle=grad; ctx.fillRect(ln.x,JY-120,ln.w,120); }\n  }\n\n  // ---------- render values ----------\n  fmt(ms){ if(ms==null) return '--:--'; const s=Math.max(0,ms)/1000; const m=Math.floor(s/60); const ss=Math.floor(s%60); const cs=Math.floor((s*100)%100); return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+String(cs).padStart(2,'0'); }\n\n  renderVals(){\n    this.setupModel();\n    this.syncProps();\n    const e=this.eng; const opt=e.opt; const c=e.counts;\n    const stateLabel = e.state==='options'?'OPTIONS': e.countIn>0?'LEAD-IN': e.playing?'PLAYING':'PAUSED';\n    const stateColor = e.state==='options'?'#c8a8ff': e.countIn>0?'#2fe08b': e.playing?'#2fe08b':'#ffb13a';\n    // timing\n    const avg = e.nTiming? e.sum/e.nTiming : 0;\n    const variance = e.nTiming? Math.max(0, e.sumsq/e.nTiming - avg*avg) : 0;\n    const dev = Math.sqrt(variance);\n    // per-measure timing: diverging bar from center (early=left/cyan, late=right/red)\n    const mstarts=this.measureStarts||[]; const mstats=e.measureStats||[]; const L=this.SONG_LEN; const CAP=70;\n    const measureRows=[];\n    for(let m=0;m<mstarts.length;m++){\n      const start=mstarts[m]; const end=m+1<mstarts.length?mstarts[m+1]:L;\n      const bottom=(start/L*100).toFixed(2)+'%'
