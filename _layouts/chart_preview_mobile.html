<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05070d">
  <title>{{ page.title | default: 'Chart preview' }}</title>
  <meta name="cp-api-base" content="https://horie.synology.me:8443">
  <link rel="preconnect" href="https://horie.synology.me:8443" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  /* Mirrors the desktop modal tokens so component shapes match exactly. */
  --cp-bg: #05070d;
  --cp-panel: #0c111c;
  --cp-panel-2: #0e1320;
  --cp-line: rgba(120,150,200,0.12);
  --cp-line-soft: rgba(120,150,200,0.07);
  --cp-text: #e8edf6;
  --cp-text-dim: #7c879a;
  --cp-text-mute: #4a5566;
  --cp-cyan: #34e0ff;
  --cp-cyan-dim: #1c6f86;
  --cp-cyan-a08: rgba(52,224,255,0.08);
  --cp-green: #37e58f;
  --cp-judge-line: #ff3344;
  --cp-pg: #ffd23f;
  --cp-g: #37e58f;
  --cp-good: #56a8ff;
  --cp-bad: #ff7a45;
  --cp-miss: #ff3b5c;
  --cp-reset: #f0995a;
  --cp-font-ui: 'Chakra Petch', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --cp-font-mono: 'JetBrains Mono', monospace;
  --cp-fs-xs: 11px;
  --cp-fs-sm: 13px;
  --cp-fs-md: 15px;
  --cp-r-sm: 4px;
  --cp-r-md: 6px;
  --cp-r-lg: 7px;
  --cp-sp-1: 4px;
  --cp-sp-2: 7px;
  --cp-sp-3: 10px;
  --cp-sp-4: 12px;
  --cp-sp-5: 16px;
  --cp-topbar-h: 48px;
  --cp-glow-cyan: 0 0 10px rgba(52,224,255,0.7);
  --cp-glow-play: 0 0 0 1px rgba(52,224,255,0.3), 0 4px 16px -6px rgba(52,224,255,0.6);
  /* Renderer cssPxOf() lookups — queue/keyzone are collapsed on mobile. */
  --cp-keyzone-h: 0px;
  --cp-queue-label-h: 0px;
  --cp-queue-bottom-pad: 0px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; height: 100dvh; overflow: hidden; }
body.cpm-body {
  background: var(--cp-bg);
  color: var(--cp-text);
  font-family: var(--cp-font-ui);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ===== shell layout ===== */
.cpm-shell {
  position: fixed;
  inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

.cpm-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--cp-sp-3);
  padding: var(--cp-sp-1) var(--cp-sp-3);
  min-height: var(--cp-topbar-h);
  border-bottom: 1px solid var(--cp-line);
  background: linear-gradient(180deg, rgba(255,255,255,0.014), transparent);
  flex: 0 0 auto;
}
.cpm-title-row {
  flex: 1;
  display: flex;
  align-items: center;
  gap: var(--cp-sp-2);
  min-width: 0;
}
.cpm-top-actions {
  display: flex;
  align-items: center;
  gap: var(--cp-sp-1);
  flex: 0 0 auto;
}

.cpm-stage {
  position: relative;
  min-height: 0;
  background: var(--cp-bg);
  overflow: hidden;
}

.cpm-bottom {
  display: flex;
  align-items: center;
  gap: var(--cp-sp-2);
  padding: var(--cp-sp-1) var(--cp-sp-3);
  border-top: 1px solid var(--cp-line);
  background: linear-gradient(0deg, rgba(255,255,255,0.014), transparent);
  flex: 0 0 auto;
}
.cpm-bottom[hidden] { display: none !important; }

/* ===== badges (cp-badge) ===== */
.cp-badge {
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-xs);
  font-weight: 500;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  padding: 3px var(--cp-sp-2);
  letter-spacing: .3px;
  white-space: nowrap;
  flex: 0 0 auto;
  background: rgba(255,255,255,0.03);
  color: var(--cp-text);
}
.cp-badge--mode {
  font-weight: 700;
  color: var(--cp-cyan);
  border-color: rgba(52,224,255,0.4);
  background: var(--cp-cyan-a08);
  letter-spacing: .5px;
}
.cp-badge[hidden] { display: none; }

.cpm-title {
  margin: 0;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .2px;
  color: #fff;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== icon buttons (cp-btn-icon) ===== */
.cp-btn {
  font-family: var(--cp-font-ui);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--cp-sp-2);
  font-size: var(--cp-fs-sm);
  font-weight: 600;
  color: var(--cp-text);
  background: var(--cp-panel-2);
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-lg);
  padding: var(--cp-sp-2) var(--cp-sp-4);
  cursor: pointer;
  letter-spacing: .3px;
  transition: .13s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.cp-btn:disabled { opacity: .4; cursor: not-allowed; }
.cp-btn svg, .cp-btn span, .cp-btn kbd { pointer-events: none; }

.cp-btn-icon {
  width: 34px;
  height: 32px;
  padding: 0;
  gap: 0;
  background: var(--cp-panel-2);
  color: var(--cp-text);
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-lg);
}
.cp-btn-icon.cp-btn-pick { color: #cfe9ff; }
.cp-btn-icon.cpm-btn-help { color: var(--cp-text-dim); }
.cp-btn-icon.cp-btn-play {
  background: var(--cp-cyan);
  border-color: var(--cp-cyan);
  color: #031018;
  box-shadow: var(--cp-glow-play);
}
.cp-btn-icon.cp-btn-play.is-playing {
  color: var(--cp-cyan);
  background: rgba(52,224,255,0.10);
  box-shadow: none;
}
.cpm-play__icon { display: none; }
.cpm-play__icon--play  { display: block; }
.cp-btn-icon.cp-btn-play.is-playing .cpm-play__icon--play  { display: none; }
.cp-btn-icon.cp-btn-play.is-playing .cpm-play__icon--pause { display: block; }
.cp-btn-icon.cp-btn-reset { color: var(--cp-reset); }

/* ===== progress (cp-progress) ===== */
.cp-progress {
  flex: 1 1 auto;
  min-width: 0;
  margin: 0;
  accent-color: var(--cp-cyan);
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 3px;
  background: var(--cp-line);
}
.cp-progress::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--cp-cyan);
  border: 2px solid #05121a;
  box-shadow: var(--cp-glow-cyan);
  cursor: pointer;
}
.cp-progress::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--cp-cyan);
  border: 2px solid #05121a;
  box-shadow: var(--cp-glow-cyan);
  cursor: pointer;
}
.cp-progress:disabled { opacity: .4; cursor: default; }

.cp-progress-time {
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-sm);
  color: var(--cp-text-dim);
  white-space: nowrap;
  min-width: 11ch;
  text-align: right;
  flex: 0 0 auto;
}
.cp-progress-time .cur { color: var(--cp-cyan); font-weight: 700; }

/* Loop band + chevron handles overlaid on the progress slider. The wrap
   gets explicit height so the chevrons have headroom above the range. */
.cp-progress-wrap {
  position: relative;
  flex: 1 1 auto;
  min-width: 0;
  height: 38px;
  display: flex;
  align-items: center;
}
.cp-progress-wrap .cp-progress { flex: 1 1 auto; }
.cpm-loop-band {
  position: absolute;
  top: 50%;
  height: 7px;
  margin-top: -3.5px;
  border-radius: 3px;
  background: rgba(167,139,250,0.35);   /* --cp-loop violet */
  pointer-events: none;
  z-index: 1;
  display: none;
}
.cpm-loop-band.is-on { display: block; }
.cpm-loop-handle {
  position: absolute;
  top: 0;
  width: 26px;
  height: 14px;
  border: 0;
  padding: 0;
  background: transparent;
  cursor: grab;
  z-index: 2;
  display: none;
  transform: translateX(-50%);
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.cpm-loop-handle.is-on { display: block; }
.cpm-loop-handle::before {
  content: "";
  position: absolute;
  left: 50%;
  bottom: 1px;
  margin-left: -7px;
  width: 0;
  height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-top: 11px solid #a78bfa;        /* --cp-loop */
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.45));
}
.cpm-loop-handle:active::before {
  border-top-color: #c4b5fd;
}

/* ===== renderer-owned canvas inside .cpm-stage ===== */
.cpm-stage .cp-stage {
  position: absolute;
  inset: 0;
  display: flex;
  background: var(--cp-bg);
}
.cpm-stage .cp-stage--dp { display: block; }
.cpm-stage .cp-field {
  position: relative;
  flex: 1;
  min-width: 0;
  min-height: 0;
  width: 100%;
  height: 100%;
  background: var(--cp-panel);
  touch-action: none;
}
.cpm-stage .cp-field::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: var(--cp-sudplus-h, 0);
  background:
    linear-gradient(180deg, #04070d 0%, #04070d calc(100% - 2px),
                    rgba(52,224,255,0.22) calc(100% - 1px), rgba(52,224,255,0) 100%);
  pointer-events: none;
  z-index: 4;
}
.cpm-stage .cp-field__play {
  position: absolute;
  inset: 0;
}
.cpm-stage .cp-field__canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
.cpm-stage .cp-queue,
.cpm-stage .cp-aux,
.cpm-stage .cp-field__bottom,
.cpm-stage .cp-keyzone {
  display: none !important;
}

/* ===== empty overlay ===== */
.cpm-empty {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cp-bg);
  z-index: 5;
}
.cpm-empty[hidden] { display: none !important; }
.cpm-empty__inner {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--cp-sp-4);
  padding: var(--cp-sp-5);
}
.cpm-empty h2 {
  margin: 0;
  font-size: 18px;
  font-weight: 700;
  color: var(--cp-text);
  letter-spacing: .2px;
}
.cpm-empty p {
  margin: 0;
  font-size: 14px;
  color: var(--cp-text-dim);
}

/* ===== transient toasts inside .cpm-stage ===== */
.cpm-toast {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  padding: 8px 14px;
  border: 1px solid rgba(52,224,255,0.4);
  border-radius: var(--cp-r-sm);
  background: rgba(5,7,13,0.88);
  color: var(--cp-text);
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-sm);
  letter-spacing: .2px;
  z-index: 40;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  white-space: nowrap;
  max-width: calc(100% - 28px);
}
.cpm-toast.is-visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* SUD+ value tip — appended into cp-field by JS so it floats at the
   bottom edge of the cover (matches desktop's cp-sudplus-tip). */
.cpm-sudplus-tip {
  position: absolute;
  left: 50%;
  top: var(--cp-sudplus-h, 0);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 5;
  font-family: var(--cp-font-mono);
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  background: rgba(0,0,0,0.55);
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .2s;
}
.cpm-sudplus-tip.is-visible { opacity: 1; }

.cpm-hispeed-toast {
  position: absolute;
  top: 12px;
  right: 12px;
  padding: 6px 10px;
  border: 1px solid rgba(52,224,255,0.4);
  border-radius: var(--cp-r-sm);
  background: rgba(5,7,13,0.78);
  color: var(--cp-cyan);
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-sm);
  font-weight: 700;
  letter-spacing: .3px;
  z-index: 30;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
}
.cpm-hispeed-toast.is-visible { opacity: 1; }

/* Loop standby countdown — circular ring + numeric remainder. Floats at
   the upper third of the canvas, mirroring desktop's positioning. */
.cpm-loop-countdown {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 64px;
  height: 64px;
  z-index: 25;
  pointer-events: none;
}
.cpm-loop-countdown[hidden] { display: none !important; }
.cpm-loop-countdown svg {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}
.cpm-loop-countdown__bg {
  fill: rgba(5,7,13,0.78);
  stroke: rgba(167,139,250,0.35);
  stroke-width: 4;
}
.cpm-loop-countdown__fg {
  fill: none;
  stroke: #a78bfa;
  stroke-width: 4;
  stroke-dasharray: 289.027;       /* 2 * PI * 46 */
  stroke-dashoffset: 0;
  stroke-linecap: round;
  filter: drop-shadow(0 0 6px rgba(167,139,250,0.6));
}
.cpm-loop-countdown__num {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--cp-font-mono);
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.5px;
}

/* ===== action bar (drops down from the topbar kebab toggle) ===== */
.cpm-actionbar {
  position: absolute;
  top: 8px;
  right: 10px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 6px;
  padding: 6px;
  background: rgba(5,7,13,0.92);
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-lg);
  box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  z-index: 40;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-8px);
  transform-origin: top right;
  transition: opacity .15s, transform .15s;
}
.cpm-actionbar.is-open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.cpm-action svg { pointer-events: none; }
.cpm-action.is-active {
  color: var(--cp-cyan);
  border-color: rgba(52,224,255,0.4);
}
.cpm-action--rotate { display: none; }
.cpm-shell[data-cpm-mode="DP"] .cpm-action--rotate { display: inline-flex; }
.cpm-action--pick   { color: #cfe9ff; }
.cpm-action--config { color: var(--cp-text-dim); }

.cp-btn-icon.cpm-btn-menu { color: var(--cp-text); }
.cp-btn-icon.cpm-btn-menu.is-open {
  background: var(--cp-cyan-a08);
  border-color: rgba(52,224,255,0.5);
  color: var(--cp-cyan);
}

/* ===== search dialog ===== */
dialog.note-attrs-search-modal {
  width: min(560px, 92vw);
  max-height: 80vh;
  padding: 0;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-md);
  background: var(--cp-panel);
  color: var(--cp-text);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  display: none;
  flex-direction: column;
  font-family: var(--cp-font-ui);
}
dialog.note-attrs-search-modal[open] { display: flex; }
dialog.note-attrs-search-modal::backdrop {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
}
.note-attrs-search-form {
  display: flex;
  gap: var(--cp-sp-2);
  padding: var(--cp-sp-3);
  border-bottom: 1px solid var(--cp-line);
  margin: 0;
  flex: 0 0 auto;
}
.note-attrs-search-input {
  flex: 1;
  min-width: 0;
  appearance: none;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  padding: 8px 10px;
  background: rgba(255,255,255,0.04);
  color: var(--cp-text);
  font-family: inherit;
  font-size: 14px;
}
.note-attrs-search-input:focus {
  outline: none;
  border-color: rgba(52,224,255,0.5);
}
.note-attrs-search-close {
  appearance: none;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  background: transparent;
  color: var(--cp-text);
  padding: 6px 12px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
}
.note-attrs-search-results {
  list-style: none;
  margin: 0;
  padding: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
  min-height: 0;
}
.note-attrs-search-results li {
  padding: 10px var(--cp-sp-4);
  border-bottom: 1px solid var(--cp-line);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: var(--cp-sp-2);
  flex-wrap: wrap;
  -webkit-tap-highlight-color: transparent;
  color: var(--cp-text);
}
.note-attrs-search-results li:active,
.note-attrs-search-results li.is-active {
  background: rgba(52,224,255,0.12);
}
.note-attrs-search-mode,
.note-attrs-search-family {
  display: inline-block;
  padding: 2px 6px;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-xs);
  font-weight: 700;
  letter-spacing: .3px;
  color: var(--cp-text-dim);
  background: rgba(255,255,255,0.03);
  flex: 0 0 auto;
}
.note-attrs-search-mode {
  color: var(--cp-cyan);
  border-color: rgba(52,224,255,0.4);
  background: var(--cp-cyan-a08);
}
.note-attrs-search-title {
  font-weight: 700;
  font-size: 14px;
  color: var(--cp-text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.note-attrs-search-artist {
  font-size: 12px;
  color: var(--cp-text-dim);
  flex: 0 0 auto;
}
.note-attrs-search-hint {
  margin: 0;
  padding: 8px var(--cp-sp-4);
  border-top: 1px solid var(--cp-line);
  font-family: var(--cp-font-mono);
  font-size: 11px;
  color: var(--cp-text-mute);
  flex: 0 0 auto;
}
.note-attrs-search-hint kbd {
  font-family: var(--cp-font-mono);
  font-size: 10px;
  padding: 1px 4px;
  border: 1px solid var(--cp-line);
  border-radius: 2px;
  color: var(--cp-text);
}

/* ===== help dialog (gesture guide) ===== */
dialog.cpm-help-modal {
  width: min(420px, 92vw);
  padding: 0;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-md);
  background: var(--cp-panel);
  color: var(--cp-text);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  font-family: var(--cp-font-ui);
}
dialog.cpm-help-modal::backdrop {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
}
.cpm-help-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--cp-sp-3) var(--cp-sp-4);
  border-bottom: 1px solid var(--cp-line);
  margin: 0;
}
.cpm-help-title {
  margin: 0;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .3px;
  color: var(--cp-text);
}
.cpm-help-close {
  appearance: none;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  background: transparent;
  color: var(--cp-text);
  width: 28px;
  height: 28px;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.cpm-help-list {
  list-style: none;
  margin: 0;
  padding: var(--cp-sp-2) 0;
}
.cpm-help-row {
  display: flex;
  align-items: center;
  gap: var(--cp-sp-4);
  padding: var(--cp-sp-3) var(--cp-sp-4);
  border-bottom: 1px solid var(--cp-line-soft);
}
.cpm-help-row:last-child { border-bottom: none; }
.cpm-help-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.cpm-help-text strong {
  font-size: 14px;
  font-weight: 700;
  color: var(--cp-text);
  letter-spacing: .2px;
}
.cpm-help-text span {
  font-size: 13px;
  color: var(--cp-text-dim);
  font-family: var(--cp-font-mono);
}

/* ===== gesture animations ===== */
.cpm-gesture {
  position: relative;
  width: 64px;
  height: 64px;
  flex: 0 0 auto;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-md);
  background: rgba(255,255,255,0.02);
  overflow: hidden;
}
.cpm-gesture__finger {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 16px;
  height: 16px;
  margin: -8px 0 0 -8px;
  border-radius: 50%;
  background: var(--cp-cyan);
  box-shadow: 0 0 8px rgba(52,224,255,0.5);
}
.cpm-gesture__ripple {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 16px;
  height: 16px;
  margin: -8px 0 0 -8px;
  border-radius: 50%;
  border: 2px solid var(--cp-cyan);
  opacity: 0;
}
/* Only animate when the dialog is actually open so the rings don't burn
   pixels in the background. */
dialog.cpm-help-modal[open] .cpm-gesture--tap .cpm-gesture__ripple {
  animation: cpm-ripple 1.6s ease-out infinite;
}
dialog.cpm-help-modal[open] .cpm-gesture--tap .cpm-gesture__finger {
  animation: cpm-tap 1.6s ease-out infinite;
}
dialog.cpm-help-modal[open] .cpm-gesture--double .cpm-gesture__ripple {
  animation: cpm-double-ripple-1 1.8s ease-out infinite;
}
dialog.cpm-help-modal[open] .cpm-gesture--double .cpm-gesture__ripple--2 {
  animation: cpm-double-ripple-2 1.8s ease-out infinite;
}
dialog.cpm-help-modal[open] .cpm-gesture--double .cpm-gesture__finger {
  animation: cpm-double-tap 1.8s ease-out infinite;
}
.cpm-gesture--pinch .cpm-gesture__finger {
  margin: 0;
  top: 50%;
  transform: translateY(-50%);
}
.cpm-gesture--pinch .cpm-gesture__finger--left {
  left: 14px;
}
.cpm-gesture--pinch .cpm-gesture__finger--right {
  left: auto;
  right: 14px;
}
dialog.cpm-help-modal[open] .cpm-gesture--pinch .cpm-gesture__finger--left {
  animation: cpm-pinch-left 2s ease-in-out infinite;
}
dialog.cpm-help-modal[open] .cpm-gesture--pinch .cpm-gesture__finger--right {
  animation: cpm-pinch-right 2s ease-in-out infinite;
}
.cpm-gesture--drag .cpm-gesture__finger--drag {
  margin: 0;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
dialog.cpm-help-modal[open] .cpm-gesture--drag .cpm-gesture__finger--drag {
  animation: cpm-drag-vert 1.8s ease-in-out infinite;
}
@keyframes cpm-drag-vert {
  0%, 100% { transform: translate(-50%, -90%); }
  50%      { transform: translate(-50%, 10%); }
}

@keyframes cpm-tap {
  0%, 8%   { transform: scale(0.85); }
  18%      { transform: scale(1); }
  35%, 100%{ transform: scale(0.85); }
}
@keyframes cpm-ripple {
  0%        { transform: scale(1); opacity: 0; }
  10%       { transform: scale(1); opacity: .9; }
  60%, 100% { transform: scale(2.6); opacity: 0; }
}
@keyframes cpm-double-tap {
  0%, 6%   { transform: scale(0.85); }
  12%      { transform: scale(1); }
  20%, 30% { transform: scale(0.85); }
  36%      { transform: scale(1); }
  44%, 100%{ transform: scale(0.85); }
}
@keyframes cpm-double-ripple-1 {
  0%        { transform: scale(1); opacity: 0; }
  6%        { transform: scale(1); opacity: .9; }
  30%, 100% { transform: scale(2.4); opacity: 0; }
}
@keyframes cpm-double-ripple-2 {
  0%, 30%   { transform: scale(1); opacity: 0; }
  36%       { transform: scale(1); opacity: .9; }
  60%, 100% { transform: scale(2.4); opacity: 0; }
}
@keyframes cpm-pinch-left {
  0%, 100% { transform: translate(0, -50%); }
  50%      { transform: translate(16px, -50%); }
}
@keyframes cpm-pinch-right {
  0%, 100% { transform: translate(0, -50%); }
  50%      { transform: translate(-16px, -50%); }
}

/* ===== config dialog ===== */
dialog.cpm-config-modal {
  width: min(420px, 92vw);
  padding: 0;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-md);
  background: var(--cp-panel);
  color: var(--cp-text);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  font-family: var(--cp-font-ui);
}
dialog.cpm-config-modal::backdrop {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
}
.cpm-config-list {
  list-style: none;
  margin: 0;
  padding: var(--cp-sp-3) 0;
}
.cpm-config-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: var(--cp-sp-3) var(--cp-sp-4);
  border-bottom: 1px solid var(--cp-line-soft);
}
.cpm-config-row:last-child { border-bottom: none; }
.cpm-config-row[hidden] { display: none !important; }
.cpm-config-toggle {
  display: flex;
  align-items: center;
  gap: var(--cp-sp-3);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.cpm-config-toggle input { position: absolute; opacity: 0; pointer-events: none; }
.cpm-config-toggle__track {
  flex: 0 0 auto;
  width: 38px;
  height: 22px;
  border-radius: 11px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--cp-line);
  position: relative;
  transition: background .15s, border-color .15s;
}
.cpm-config-toggle__track::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--cp-text-dim);
  transition: transform .15s, background .15s;
}
.cpm-config-toggle input:checked + .cpm-config-toggle__track {
  background: var(--cp-cyan-a08);
  border-color: rgba(52,224,255,0.5);
}
.cpm-config-toggle input:checked + .cpm-config-toggle__track::after {
  background: var(--cp-cyan);
  transform: translateX(16px);
}
.cpm-config-toggle__label {
  font-size: 14px;
  font-weight: 700;
  color: var(--cp-text);
  letter-spacing: .2px;
}
.cpm-config-hint {
  font-family: var(--cp-font-mono);
  font-size: 11px;
  color: var(--cp-text-mute);
  margin-left: 50px;
}
.cpm-config-radios {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 6px 0 0 0;
}
.cpm-config-radios label {
  position: relative;
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-xs);
  font-weight: 700;
  color: var(--cp-text-dim);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.cpm-config-radios input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 0;
  height: 0;
}
.cpm-config-radios label:has(input:checked) {
  color: var(--cp-cyan);
  border-color: rgba(52,224,255,0.5);
  background: var(--cp-cyan-a08);
}

@media (min-width: 1024px) {
  .cpm-shell::after {
    content: "Desktop users — open the Chart preview modal from Note attributes for the full layout.";
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 14px;
    background: rgba(12,17,28,0.92);
    border: 1px solid var(--cp-line);
    border-radius: var(--cp-r-sm);
    font-size: 12px;
    color: var(--cp-text-dim);
    pointer-events: none;
  }
}
  </style>
</head>
