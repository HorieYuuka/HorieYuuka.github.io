<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05070d">
  <title>{{ page.title | default: 'Chart preview' }}</title>
  <meta name="cp-api-base" content="https://horie.synology.me:8443">
  <link rel="preconnect" href="https://horie.synology.me:8443" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  /* Mirrors the desktop modal tokens so component shapes match exactly. */
  --cp-bg: #05070d;
  --cp-panel: #0c111c;
  --cp-panel-2: #0e1320;
  --cp-line: rgba(120,150,200,0.12);
  --cp-line-soft: rgba(120,150,200,0.07);
  --cp-text: #e8edf6;
  --cp-text-dim: #7c879a;
  --cp-text-mute: #4a5566;
  --cp-cyan: #34e0ff;
  --cp-cyan-dim: #1c6f86;
  --cp-cyan-a08: rgba(52,224,255,0.08);
  --cp-green: #37e58f;
  --cp-judge-line: #ff3344;
  --cp-pg: #ffd23f;
  --cp-g: #37e58f;
  --cp-good: #56a8ff;
  --cp-bad: #ff7a45;
  --cp-miss: #ff3b5c;
  --cp-reset: #f0995a;
  --cp-font-ui: 'Chakra Petch', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --cp-font-mono: 'JetBrains Mono', monospace;
  --cp-fs-xs: 11px;
  --cp-fs-sm: 13px;
  --cp-fs-md: 15px;
  --cp-r-sm: 4px;
  --cp-r-md: 6px;
  --cp-r-lg: 7px;
  --cp-sp-1: 4px;
  --cp-sp-2: 7px;
  --cp-sp-3: 10px;
  --cp-sp-4: 12px;
  --cp-sp-5: 16px;
  --cp-topbar-h: 50px;
  --cp-glow-cyan: 0 0 10px rgba(52,224,255,0.7);
  --cp-glow-play: 0 0 0 1px rgba(52,224,255,0.3), 0 4px 16px -6px rgba(52,224,255,0.6);
  /* Renderer cssPxOf() lookups — queue/keyzone are collapsed on mobile. */
  --cp-keyzone-h: 0px;
  --cp-queue-label-h: 0px;
  --cp-queue-bottom-pad: 0px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; height: 100dvh; overflow: hidden; }
body.cpm-body {
  background: var(--cp-bg);
  color: var(--cp-text);
  font-family: var(--cp-font-ui);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ===== shell layout ===== */
.cpm-shell {
  position: fixed;
  inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

.cpm-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--cp-sp-3);
  padding: var(--cp-sp-2) var(--cp-sp-4);
  min-height: var(--cp-topbar-h);
  border-bottom: 1px solid var(--cp-line);
  background: linear-gradient(180deg, rgba(255,255,255,0.014), transparent);
  flex: 0 0 auto;
}
.cpm-title-row {
  flex: 1;
  display: flex;
  align-items: center;
  gap: var(--cp-sp-2);
  min-width: 0;
}

.cpm-stage {
  position: relative;
  min-height: 0;
  background: var(--cp-bg);
  overflow: hidden;
}

.cpm-bottom {
  display: flex;
  align-items: center;
  gap: var(--cp-sp-3);
  padding: var(--cp-sp-2) var(--cp-sp-4);
  border-top: 1px solid var(--cp-line);
  background: linear-gradient(0deg, rgba(255,255,255,0.014), transparent);
  flex: 0 0 auto;
}
.cpm-bottom[hidden] { display: none !important; }

/* ===== badges (cp-badge) ===== */
.cp-badge {
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-xs);
  font-weight: 500;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  padding: 3px var(--cp-sp-2);
  letter-spacing: .3px;
  white-space: nowrap;
  flex: 0 0 auto;
  background: rgba(255,255,255,0.03);
  color: var(--cp-text);
}
.cp-badge--mode {
  font-weight: 700;
  color: var(--cp-cyan);
  border-color: rgba(52,224,255,0.4);
  background: var(--cp-cyan-a08);
  letter-spacing: .5px;
}
.cp-badge[hidden] { display: none; }

.cpm-title {
  margin: 0;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .2px;
  color: #fff;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== icon buttons (cp-btn-icon) ===== */
.cp-btn {
  font-family: var(--cp-font-ui);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--cp-sp-2);
  font-size: var(--cp-fs-sm);
  font-weight: 600;
  color: var(--cp-text);
  background: var(--cp-panel-2);
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-lg);
  padding: var(--cp-sp-2) var(--cp-sp-4);
  cursor: pointer;
  letter-spacing: .3px;
  transition: .13s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.cp-btn:disabled { opacity: .4; cursor: not-allowed; }
.cp-btn svg, .cp-btn span, .cp-btn kbd { pointer-events: none; }

.cp-btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  gap: 0;
  background: var(--cp-panel-2);
  color: var(--cp-text);
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-lg);
}
.cp-btn-icon.cp-btn-pick { color: #cfe9ff; }
.cp-btn-icon.cp-btn-play {
  width: 44px;
  height: 44px;
  background: var(--cp-cyan);
  border-color: var(--cp-cyan);
  color: #031018;
  box-shadow: var(--cp-glow-play);
}
.cp-btn-icon.cp-btn-play.is-playing {
  color: var(--cp-cyan);
  background: rgba(52,224,255,0.10);
  box-shadow: none;
}
.cp-btn-icon.cp-btn-reset { color: var(--cp-reset); }

/* ===== progress (cp-progress) ===== */
.cp-progress {
  flex: 1 1 auto;
  min-width: 0;
  margin: 0;
  accent-color: var(--cp-cyan);
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 3px;
  background: var(--cp-line);
}
.cp-progress::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cp-cyan);
  border: 2px solid #05121a;
  box-shadow: var(--cp-glow-cyan);
  cursor: pointer;
}
.cp-progress::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cp-cyan);
  border: 2px solid #05121a;
  box-shadow: var(--cp-glow-cyan);
  cursor: pointer;
}
.cp-progress:disabled { opacity: .4; cursor: default; }

.cp-progress-time {
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-sm);
  color: var(--cp-text-dim);
  white-space: nowrap;
  min-width: 11ch;
  text-align: right;
  flex: 0 0 auto;
}
.cp-progress-time .cur { color: var(--cp-cyan); font-weight: 700; }

/* ===== renderer-owned canvas inside .cpm-stage ===== */
.cpm-stage .cp-stage {
  position: absolute;
  inset: 0;
  display: flex;
  background: var(--cp-bg);
}
.cpm-stage .cp-stage--dp { display: block; }
.cpm-stage .cp-field {
  position: relative;
  flex: 1;
  min-width: 0;
  min-height: 0;
  width: 100%;
  height: 100%;
  background: var(--cp-panel);
  touch-action: none;            /* tap/double-tap/pinch handled in JS */
}
.cpm-stage .cp-field__play {
  position: absolute;
  inset: 0;
}
.cpm-stage .cp-field__canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
.cpm-stage .cp-queue,
.cpm-stage .cp-aux,
.cpm-stage .cp-field__bottom,
.cpm-stage .cp-keyzone {
  display: none !important;
}

/* ===== empty + rotate overlays ===== */
.cpm-empty {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cp-bg);
  z-index: 5;
}
.cpm-empty[hidden] { display: none !important; }
.cpm-empty__inner {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--cp-sp-4);
  padding: var(--cp-sp-5);
}
.cpm-empty h2 {
  margin: 0;
  font-size: 18px;
  font-weight: 700;
  color: var(--cp-text);
  letter-spacing: .2px;
}
.cpm-empty p {
  margin: 0;
  font-size: 14px;
  color: var(--cp-text-dim);
}

.cpm-rotate-hint {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(5,7,13,0.92);
  z-index: 50;
  color: var(--cp-text);
}
.cpm-rotate-hint__inner {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--cp-sp-4);
  padding: var(--cp-sp-5);
}
.cpm-rotate-hint__inner p {
  margin: 0;
  font-size: 14px;
  color: var(--cp-text-dim);
}
.cpm-rotate-hint__inner svg { color: var(--cp-cyan); }
@media (orientation: portrait) {
  .cpm-shell[data-cpm-mode="DP"] .cpm-rotate-hint { display: flex; }
}

/* ===== HI-SPEED transient overlay during pinch ===== */
.cpm-hispeed-toast {
  position: absolute;
  top: 12px;
  right: 12px;
  padding: 6px 10px;
  border: 1px solid rgba(52,224,255,0.4);
  border-radius: var(--cp-r-sm);
  background: rgba(5,7,13,0.78);
  color: var(--cp-cyan);
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-sm);
  font-weight: 700;
  letter-spacing: .3px;
  z-index: 30;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
}
.cpm-hispeed-toast.is-visible { opacity: 1; }

/* ===== search dialog (replicates desktop look without theme cascade) ===== */
dialog.note-attrs-search-modal {
  width: min(560px, 92vw);
  max-height: 80vh;
  padding: 0;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-md);
  background: var(--cp-panel);
  color: var(--cp-text);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  display: none;
  flex-direction: column;
  font-family: var(--cp-font-ui);
}
dialog.note-attrs-search-modal[open] { display: flex; }
dialog.note-attrs-search-modal::backdrop {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
}
.note-attrs-search-form {
  display: flex;
  gap: var(--cp-sp-2);
  padding: var(--cp-sp-3);
  border-bottom: 1px solid var(--cp-line);
  margin: 0;
  flex: 0 0 auto;
}
.note-attrs-search-input {
  flex: 1;
  min-width: 0;
  appearance: none;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  padding: 8px 10px;
  background: rgba(255,255,255,0.04);
  color: var(--cp-text);
  font-family: inherit;
  font-size: 14px;
}
.note-attrs-search-input:focus {
  outline: none;
  border-color: rgba(52,224,255,0.5);
}
.note-attrs-search-close {
  appearance: none;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  background: transparent;
  color: var(--cp-text);
  padding: 6px 12px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
}
.note-attrs-search-results {
  list-style: none;
  margin: 0;
  padding: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
  min-height: 0;
}
.note-attrs-search-results li {
  padding: 10px var(--cp-sp-4);
  border-bottom: 1px solid var(--cp-line);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: var(--cp-sp-2);
  flex-wrap: wrap;
  -webkit-tap-highlight-color: transparent;
  color: var(--cp-text);
}
.note-attrs-search-results li:active,
.note-attrs-search-results li.is-active {
  background: rgba(52,224,255,0.12);
}
.note-attrs-search-mode,
.note-attrs-search-family {
  display: inline-block;
  padding: 2px 6px;
  border: 1px solid var(--cp-line);
  border-radius: var(--cp-r-sm);
  font-family: var(--cp-font-mono);
  font-size: var(--cp-fs-xs);
  font-weight: 700;
  letter-spacing: .3px;
  color: var(--cp-text-dim);
  background: rgba(255,255,255,0.03);
  flex: 0 0 auto;
}
.note-attrs-search-mode {
  color: var(--cp-cyan);
  border-color: rgba(52,224,255,0.4);
  background: var(--cp-cyan-a08);
}
.note-attrs-search-title {
  font-weight: 700;
  font-size: 14px;
  color: var(--cp-text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.note-attrs-search-artist {
  font-size: 12px;
  color: var(--cp-text-dim);
  flex: 0 0 auto;
}
.note-attrs-search-hint {
  margin: 0;
  padding: 8px var(--cp-sp-4);
  border-top: 1px solid var(--cp-line);
  font-family: var(--cp-font-mono);
  font-size: 11px;
  color: var(--cp-text-mute);
  flex: 0 0 auto;
}
.note-attrs-search-hint kbd {
  font-family: var(--cp-font-mono);
  font-size: 10px;
  padding: 1px 4px;
  border: 1px solid var(--cp-line);
  border-radius: 2px;
  color: var(--cp-text);
}

@media (min-width: 1024px) {
  .cpm-shell::after {
    content: "Desktop users — open the Chart preview modal from Note attributes for the full layout.";
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 14px;
    background: rgba(12,17,28,0.92);
    border: 1px solid var(--cp-line);
    border-radius: var(--cp-r-sm);
    font-size: 12px;
    color: var(--cp-text-dim);
    pointer-events: none;
  }
}
  </style>
</head>
<body class="cpm-body">
  {{ content }}
</body>
</html>
